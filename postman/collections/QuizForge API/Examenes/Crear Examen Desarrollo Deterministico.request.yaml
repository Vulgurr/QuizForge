$kind: http-request
name: Crear Examen Desarrollo Deterministico
url: "{{baseurl}}/api/examenes"
method: POST
body:
  type: json
  content: "{\r   \"titulo\": \"Examen de Química\",\r   \"descripcion\": \"Examen
    de química orgánica\",\r   \"categoriaId\": 1,\r   \"preguntas\":
    [\r     {\r       \"tipo\":
    \"DESARROLLO_DETERMINISTICO\",\r       \"texto\": \"¿Cuál es la fórmula
    química del agua?\",\r       \"respuestaEsperadaExacta\":
    \"H2O\"\r     }\r   ]\r }"
headers:
  - name: Authorization
    value: "Bearer {{jwt_token}}"
scripts:
