    code: "// Verificar respuesta\r if (pm.response.code === 201) {\r
      console.log(\"Examen creado exitosamente\");\r } else {\r
      console.log(\"Error al crear examen: \" + pm.response.code);\r }"
    language: text/javascript
order: 6000
