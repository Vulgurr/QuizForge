$kind: http-request
url: "{{baseurl}}/api/categorias"
method: GET
scripts:
  - type: afterResponse
    code: |-
      // Verificar respuesta
      if (pm.response.code === 200) {
          console.log("Categorías listadas exitosamente");
      } else {
          console.log("Error al listar categorías: " + pm.response.code);
      }
    language: text/javascript
order: 3000
